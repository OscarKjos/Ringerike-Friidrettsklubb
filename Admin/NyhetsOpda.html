<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Admin Legg til Nyhet</title>

    <style>
        body{
            background-color: #efeff4;
            font-family: 'Gill Sans MT', "Gill Sans", 'Open Sans', "Segoe UI", Arial, sans-serif;
        }

        #nyhetsSkjema input,select,textarea{
            font-size: 16px;
        }

        #SecondInput{
            height: 35vh;
            align-items: top;
            padding:10px;
            line-height: 1.4;
            width:90%;
        }

        #FirstInput{
            padding:10px;
            font-size: 16px;
            width:90%;
        }

        #Flexor{
            display:flex;
            flex-direction: column;
            margin:10px;
            background-color: white;
            border-radius: 10px;
            padding:10px;
            height: auto;
        }

        #Submit{
            margin-top:20px;
            width:100%;
            height: 50px;
            border:none;
            font-size: 15px;
            color:white;
            background-color:  rgb(55, 83, 174);
            border-radius: 10px;
        }

        #FlexBro{
            display:flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        #FlexBro button{
            width:50px;
            height: 50px;
            font-size: 15px;
        }

        #FilOpplastning{
            margin-top:15px;
            font-size: 15px;
            width:100%;
        }

        /*_______________Responsiv Desktop________________*/

            @media (min-width:450px){
                #FlexGrid{
                    width:100%;
                    display:flex;
                    justify-content: center;
                    align-items: center;
                }

                #Flexor{
                    padding:20px;
                }

                #FirstInput{
                    width:95%;
                }

                #SecondInput{
                    width:95%;
                }
            }

    </style>

</head>
<body>
    <div id="FlexGrid">
    <div id="Flexor">
        <span id="FlexBro">
            <h1>Legg til Nyhet</h1>
            <a href="Admin.html"><button><i class="fa-solid fa-x"></i></button></a>
        </span>
        
        <form id="nyhetsSkjema">
            <p><b>Overskrift</b></p>
                <input id="FirstInput" name="tittel" type="text" maxlength="45" placeholder="Overskrift" required>
            <p><b>Nyhetsartikkel</b></p>
                <textarea id="SecondInput" minlength="125" name="innhold" type="text" placeholder="Skriv din nyhetsartikkel her" required></textarea>
                <input id="FilOpplastning" type="file" accept="image/*">
            <button id="Submit" type="submit">Legg til nyhet!</button>
        </form>
    </div>
    </div>

    <script>
        const form = document.getElementById("nyhetsSkjema");
        const Submit = document.getElementById("Submit");

        form.addEventListener("submit", () => {
            Submit.disabled = true;
            Submit.innerText = "Sender...";
        });
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://xyfexcvmnhjepfpqgwlm.supabase.co'
        const supabaseKey = 'sb_publishable_j-Np3P2UQ_rCkblvxpmC4w_l5FQ7HN3'
        const supabase = createClient(supabaseUrl, supabaseKey)

        document.getElementById('nyhetsSkjema').addEventListener('submit', async (e) => {
            e.preventDefault()

            const tittel = document.getElementById('FirstInput').value
            const innhold = document.getElementById('SecondInput').value
            const fileInput = document.getElementById('FilOpplastning')
            const file = fileInput.files[0]

            let bildeUrl = null

            // Last opp bilde hvis valgt
            if (file) {
            const fileName = `${Date.now()}_${file.name}`


            if (file.size > 300 * 1024) {
                alert('Bildet er for stort. Maks størrelse er 300 KB.')
                return
            }

            const { error: uploadError } = await supabase.storage
                .from('NyhetsBilder')
                .upload(fileName, file)

            if (uploadError) {
                alert('Feil ved bildeopplasting: ' + uploadError.message)
                return
            }

        const { data: publicData } = supabase.storage
            .from('NyhetsBilder')
            .getPublicUrl(fileName)

        bildeUrl = publicData.publicUrl
    }

    // Lagre nyhet (med eller uten bilde)
    const { error } = await supabase
        .from('Nyheter')
        .insert([{ tittel, innhold, bilde: bildeUrl, klubb_id:"RFIK"}])

    if (error) {
        Submit.innerText = "Noe gikk galt";
        alert('Feil: ' + error.message)
    } else {
        Submit.innerText = "Lagret ✓";
        alert('Nyheten ble lagt til!')
        window.location.href = 'Admin.html'
    }
})
</script>

</body>
</html>
